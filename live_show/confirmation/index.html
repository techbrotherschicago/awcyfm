<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWCY FORM</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.1.9/p5.js"></script>
    <script>
let x; 
let y; 
let size=50;
let grow = true;

function setup() { 
    cnv=createCanvas(400, 400);
    let newCanvasX = (windowWidth- 400)/2;
    let newCanvasY = (windowHeight- 400)/2;
    cnv.position(newCanvasX,newCanvasY);
    x = 200;
    y = 200;
} 

function draw() { 
  background(0);
  ellipse(x, y, size, size); 
  if (size > 400)
    {
      grow = false;
    }
  if (size<5)
    {
      grow = true;
    }
  if (grow== true)
    {
      size++;
    }
  else {
   size--; 
  }

} 
    </script>
    <style>
        body {
            background-color: black;
            vertical-align: middle;
            color: white; 
        }
    </style>
</head>
<body>
    <h1>THANK YOU. YOU ARE MORE SPECIAL THAN YOU CAN POSSIBLY IMAGINE.</h1>
</body>
</html>
